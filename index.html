<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Nardi – Pump Flow Rate Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E50C1D; --bg:#f2f3f5; --border:rgba(62,66,69,0.12);
  --fh:'Rajdhani',sans-serif; --fb:'IBM Plex Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:var(--fb);overflow-x:hidden;}

header{
  display:flex; flex-wrap:wrap; background:#fff; border-bottom:3px solid var(--red);
  min-height:70px; align-items:center; padding:10px 20px; gap:20px;
}
.logo-block img{height:45px; display:block;}
h1{font-family:var(--fh); font-size:20px; text-transform:uppercase; letter-spacing:1px; flex:1; min-width:200px;}

main{display:grid; grid-template-columns:280px 1fr; min-height:calc(100vh - 70px);}

@media (max-width: 850px) {
  main{grid-template-columns: 1fr;}
  .left-panel{border-right:none; border-bottom:1px solid var(--border);}
}

.left-panel{background:#fff; border-right:1px solid var(--border); padding:15px; overflow-y:auto;}
.vchip{padding:12px; background:#f8f9fa; border:1px solid var(--border); border-radius:8px; cursor:pointer; margin-bottom:8px; transition:0.2s;}
.vchip.active{border-color:var(--red); background:rgba(229,12,29,0.05); font-weight:600;}

.right-panel{display:flex; flex-direction:column; padding:15px; gap:15px;}
.prod-card{background:#fff; padding:20px; border-radius:12px; border:1px solid var(--border); display:flex; flex-wrap:wrap; gap:20px; align-items:center;}
.prod-img-wrap{width:150px; height:120px; display:flex; align-items:center; justify-content:center; background:#f9f9f9; border-radius:8px;}
.prod-img-wrap img{max-width:100%; max-height:100%; object-fit:contain;}

.reading{display:flex; flex-direction:column;}
.flow-val{font-size:48px; font-family:'IBM Plex Mono',monospace; color:var(--red); font-weight:600; line-height:1;}
.flow-unit{font-size:18px; color:#666; font-weight:500;}

.canvas-container{background:#fff; border-radius:12px; border:1px solid var(--border); padding:15px; position:relative; flex:1; min-height:350px;}
canvas{width:100%; height:100%; touch-action:none; cursor:crosshair;}
</style>
</head>
<body>

<header>
  <div class="logo-block"><img src="logo-nardi.png" alt="Nardi"></div>
  <h1>Oilfree Pump Calculator</h1>
</header>

<main>
  <aside class="left-panel" id="pumpList"></aside>
  <section class="right-panel">
    <div class="prod-card">
      <div class="prod-img-wrap"><img id="mainImg" src="" alt="Pump"></div>
      <div class="reading">
        <span id="flowVal" class="flow-val">0.0</span>
        <span id="unitLbl" class="flow-unit">L/min @ 0.0 bar</span>
      </div>
    </div>
    <div class="canvas-container">
      <canvas id="perfCanvas"></canvas>
    </div>
  </section>
</main>
